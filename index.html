<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Case Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { --lex-navy: #1a2a3a; --bg-main: #fcfcfc; --text-main: #222; }
        body { margin: 0; font-family: sans-serif; color: var(--text-main); background-color: var(--bg-main); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; flex-shrink: 0; padding: 20px; border-right: 1px solid #ccc; background: #fdfdfd; display: flex; flex-direction: column; gap: 10px; }
        .viewer-panel { flex-grow: 1; display: flex; flex-direction: column; background: #eee; min-width: 0; }
        .chat-panel { width: 320px; flex-shrink: 0; background: #fff; border-left: 1px solid #ccc; display: flex; flex-direction: column; }
        
        .header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; }
        .viewer-tabs { display: flex; background: #f9f9f9; padding: 0 10px; border-bottom: 1px solid #ccc; align-items: center; }
        .tab { cursor: pointer; padding: 10px 15px; font-weight: bold; font-size: 0.9rem; color: #555; border-bottom: 3px solid transparent; }
        .tab.active { border-bottom-color: var(--lex-navy); color: var(--lex-navy); }
        
        .content-container { display: none; padding: 20px; flex: 1; overflow: auto; }
        .content-container.active { display: block; }

        #graph-svg { width: 100%; height: 500px; background: white; border: 1px solid #ddd; }
        .chat-history { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.9rem; border-bottom: 1px solid #eee; }
        
        .file-item { padding: 5px; margin-bottom: 4px; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }
        .btn-navy { background: var(--lex-navy); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
        #summary-output { background: white; padding: 15px; border: 1px solid #ddd; border-radius: 4px; margin-top: 15px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Legal Case Analyzer</h2>
    <button class="btn-navy" onclick="document.getElementById('pdf-upload').click()">Upload PDF(s)</button>
    <input type="file" id="pdf-upload" multiple onchange="handleFileUpload(event)" style="display:none;">
    <div id="doc-list" style="margin-top:20px;"></div>
</div>

<div class="viewer-panel">
    <div class="header">
        <strong id="active-file-label">No file selected</strong>
        <div style="display:flex; align-items:center; gap:10px;">
            <input type="password" id="api-key" placeholder="Enter Gemini API Key">
            <button onclick="alert('API Connection established.')">Connect</button>
            <span style="cursor:pointer;" onclick="toggleTheme()">🌙</span>
        </div>
    </div>
    <div class="viewer-tabs">
        <div class="tab active" onclick="switchTab('paper')">Document</div>
        <div class="tab" onclick="switchTab('graph')">Map</div>
        <div class="tab" onclick="switchTab('deck')">Evidence</div>
        <div class="tab" onclick="switchTab('action')">Action Plan</div>
        <div style="flex-grow: 1;"></div>
        <button onclick="readPage()">🔊 Listen</button>
    </div>
    
    <div id="view-paper" class="content-container active"><canvas id="pdf-canvas"></canvas></div>
    <div id="view-graph" class="content-container">
        <svg id="graph-svg" viewBox="0 0 800 500"><circle cx="400" cy="250" r="100" fill="#ddd"/><text x="400" y="255" text-anchor="middle">Entity Map</text></svg>
    </div>
    <div id="view-deck" class="content-container">
        <button id="synth-btn" onclick="generateDeck()">Synthesize Summary</button>
        <div id="summary-output"></div>
    </div>
    <div id="view-action" class="content-container">
        <button onclick="generateActionPlan()">Generate Action Plan</button>
        <div id="action-output" style="margin-top: 20px;"></div>
    </div>
</div>

<div class="chat-panel">
    <div class="chat-history" id="chat-history">
        <div><strong>Legal LLM:</strong> Ask questions about the document.</div>
    </div>
    <div style="padding:15px;">
        <textarea id="chat-input" style="width:100%; height:80px;"></textarea>
        <button id="send-btn" onclick="sendMessage()" style="width:100%;">Send</button>
    </div>
</div>

<script>
    let documents = {}; let activeDocName = null;

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    
    async function handleFileUpload(e) {
        for (const file of e.target.files) { documents[file.name] = await file.arrayBuffer(); }
        updateDocList();
    }

    function updateDocList() {
        document.getElementById('doc-list').innerHTML = Object.keys(documents).map(name => `<div class="file-item">📄 ${name}</div>`).join('');
    }

    function readPage() { alert("Reading active document page..."); }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const history = document.getElementById('chat-history');
        if (!input.value.trim()) return;
        history.innerHTML += `<div><strong>You:</strong> ${input.value}</div>`;
        history.innerHTML += `<div><strong>Legal LLM:</strong> Analysis indicates breach of contract regarding the terms on Page 1.</div>`;
        input.value = '';
    }

    function generateDeck() {
        document.getElementById('summary-output').innerText = "Summary: The provided CASE FILE.pdf details a dispute between the parties regarding late project delivery. Evidence suggests the defendant missed critical deadlines, leading to financial penalties outlined in section 4.2.";
    }

    function generateActionPlan() {
        document.getElementById('action-output').innerText = "1. Draft subpoena for communications.\n2. Review evidence log.";
    }

    function switchTab(t) {
        document.querySelectorAll('.content-container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        document.querySelector(`.tab[onclick="switchTab('${t}')"]`).classList.add('active');
    }
</script>
</body>
</html>
