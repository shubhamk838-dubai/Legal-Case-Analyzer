<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Legal Tech Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS/3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        :root {
            --lex-navy: #1a2a3a;
            --lex-gold: #c5a059;
            --bg-main: #fcfcfc;
            --text-main: #222;
            --border-color: #d1d1d1;
        }

        body.dark-mode {
            --lex-navy: #0a121a;
            --lex-gold: #9d8048;
            --bg-main: #0f0f0f;
            --text-main: #e0e0e0;
            --border-color: #333;
        }

        body { margin: 0; font-family: "Palatino Linotype", "Book Antiqua", serif; color: var(--text-main); background-color: var(--bg-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { background-color: var(--lex-navy); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .brand-title { font-size: 1.5rem; font-weight: bold; letter-spacing: 0.5px; }
        .workspace { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--bg-main); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .upload-section { padding: 20px; border-bottom: 1px solid var(--border-color); }
        .upload-btn { display: block; padding: 12px; border: 1px solid var(--lex-gold); color: var(--lex-gold); text-align: center; cursor: pointer; border-radius: 2px; }
        .doc-item { padding: 12px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .doc-item.active { background: #f0f0f0; border-left: 4px solid var(--lex-gold); }

        /* Viewer */
        .viewer-panel { flex: 1; display: flex; flex-direction: column; background: #eee; }
        .viewer-tabs { display: flex; background: white; border-bottom: 1px solid var(--border-color); padding: 0 20px; gap: 20px; min-height: 50px; align-items: center; }
        .tab { padding: 15px 5px; cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; }
        .tab.active { color: var(--lex-navy); border-bottom-color: var(--lex-navy); }
        .content-container { flex: 1; overflow: auto; display: none; padding: 20px; flex-direction: column; align-items: center; }
        .content-container.active { display: flex; }

        /* Chat */
        .chat-panel { width: 400px; background: white; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .chat-history { flex: 1; overflow-y: auto; padding: 20px; font-family: sans-serif; font-size: 0.9rem; }
        .message { padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #eee; }
        .message.ai { border-left: 3px solid var(--lex-gold); background: #fdfdfd; }
        .chat-input-area { padding: 15px; border-top: 1px solid var(--border-color); }
        textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--lex-navy); color: white; padding: 8px 16px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">Legal Case Analyzer</div>
        <div>
            <button onclick="toggleTheme()">Toggle Mode</button>
            <input type="password" id="api-key" placeholder="Gemini Key">
        </div>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div class="upload-section">
                <label for="pdf-upload" class="upload-btn">Upload Case Files / Contracts</label>
                <input type="file" id="pdf-upload" accept="application/pdf" multiple style="display: none;">
            </div>
            <ul class="doc-list" id="doc-list"></ul>
        </div>

        <div class="viewer-panel">
            <div class="viewer-tabs">
                <div class="tab active" onclick="switchTab('paper')">Document View</div>
                <div class="tab" onclick="switchTab('graph')">Case Mapping</div>
                <div class="tab" onclick="switchTab('deck')">Evidence Board</div>
            </div>
            <div id="view-paper" class="content-container active">
                <canvas id="pdf-canvas"></canvas>
            </div>
            <div id="view-graph" class="content-container">
                <button onclick="generateGraph()">Analyze Legal Entities & BPMN Relationships</button>
                <div id="mermaid-output" class="mermaid"></div>
            </div>
            <div id="view-deck" class="content-container">
                <button onclick="generateDeck()">Synthesize Evidence Summary</button>
                <div id="beamer-display"></div>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-history" id="chat-history">
                <div class="message ai">LexGraph Ready. Upload contracts to identify discrepancies or deposition transcripts to map case events.</div>
            </div>
            <div class="chat-input-area">
                <textarea id="chat-input" placeholder="Query contract clauses or discrepancies..."></textarea>
                <button onclick="sendMessage()">Analyze & Query</button>
            </div>
        </div>
    </div>

    <script>
        let documents = {}; let currentDocId = null;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        async function sendMessage() {
            const apiKey = document.getElementById('api-key').value.trim();
            const message = document.getElementById('chat-input').value;
            if (!apiKey || !currentDocId) return alert("API Key and Document Required");

            appendMessage(message, 'user');
            
            // AGENTIC SYSTEM PROMPT
            const payload = {
                contents: [{ role: "user", parts: [{text: message}, {inlineData: {mimeType: "application/pdf", data: documents[currentDocId].data}}] }],
                tools: [{ "google_search": {} }],
                systemInstruction: { parts: [{ text: "You are a Legal Research Associate. Your role is to map case relationships, identify discrepancies in contracts (e.g., between master agreements and addenda), and extract liability clauses. If information is missing from the document, use Google Search to find relevant case law or precedents. ALWAYS cite clauses, page numbers, or articles (e.g., [Page 5], [Clause 3.1])." }] }
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const data = await response.json();
            appendMessage(data.candidates[0].content.parts[0].text, 'ai');
        }

        async function generateGraph() {
            const prompt = `Analyze this legal document. Extract core Entities (Plaintiff, Defendant, Jurisdiction), Events, and Obligations. 
            Create a BPMN-style relational graph using mermaid.js 'graph TD'.
            Nodes should be boxed [Entity Name]. Use directional arrows with clearly labeled relationship text.
            Do not include markdown blocks. Output raw mermaid code only.`;
            // ... (rest of logic follows previous structure)
        }

        // ... Add standard UI handlers (loadPdfDocument, handleFileUpload, etc)
        function appendMessage(text, sender) {
            const h = document.getElementById('chat-history');
            const d = document.createElement('div');
            d.className = `message ${sender}`;
            d.innerText = text;
            h.appendChild(d);
        }

        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function switchTab(t) { /* Hide/Show containers logic */ }
        function handleFileUpload(e) { /* File Reader logic */ }
        function selectDocument(id) { currentDocId = id; /* Render PDF logic */ }
    </script>
</body>
</html>
