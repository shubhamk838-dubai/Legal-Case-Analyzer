<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Case Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root { 
            --lex-navy: #1a2a3a; --lex-gold: #c5a059; 
            --bg-body: #fcfcfc; --bg-sidebar: #fdfdfd; --bg-chat: #ffffff; 
            --text-main: #222; --border: #ccc; 
        }
        body.dark-mode { 
            --bg-body: #121212; --bg-sidebar: #1e1e1e; --bg-chat: #1e1e1e; 
            --text-main: #e0e0e0; --border: #444; 
        }
        body { margin: 0; font-family: sans-serif; color: var(--text-main); background-color: var(--bg-body); display: flex; height: 100vh; overflow: hidden; transition: background 0.3s; }
        
        .sidebar { width: 260px; padding: 20px; border-right: 1px solid var(--border); background: var(--bg-sidebar); display: flex; flex-direction: column; gap: 10px; }
        .viewer-panel { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-body); min-width: 0; }
        .chat-panel { width: 300px; background: var(--bg-chat); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .header { background: var(--bg-sidebar); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .viewer-tabs { display: flex; background: var(--bg-sidebar); padding: 0 10px; border-bottom: 1px solid var(--border); }
        .tab { cursor: pointer; padding: 10px 15px; font-weight: bold; font-size: 0.9rem; color: var(--text-main); border-bottom: 3px solid transparent; }
        .tab.active { border-bottom-color: var(--lex-navy); }
        
        .content-container { display: none; padding: 20px; flex: 1; overflow: auto; }
        .content-container.active { display: block; }

        #graph-svg { width: 100%; height: 500px; background: white; border: 1px solid var(--border); }
        .chat-history { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.9rem; border-bottom: 1px solid var(--border); }
        
        .file-item { cursor: pointer; padding: 8px; border-radius: 4px; font-size: 0.85rem; border: 1px solid transparent; }
        .file-item.active { background: var(--lex-navy); color: white; }
        .connected-btn { background-color: #d4edda !important; color: #155724 !important; border-color: #c3e6cb !important; }
        
        .btn-main { background: var(--lex-navy); color: white; padding: 10px; text-align: center; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Legal Case Analyzer</h3>
    <label for="pdf-upload" class="btn-main">Upload PDF(s)</label>
    <input type="file" id="pdf-upload" multiple onchange="handleFileUpload(event)" style="display:none;">
    <div id="doc-list" style="margin-top:20px;"></div>
</div>

<div class="viewer-panel">
    <div class="header">
        <div id="active-file-label"><strong>No file selected</strong></div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="password" id="api-key" placeholder="Enter Gemini API Key" style="padding:5px;">
            <button id="connect-btn" onclick="connectAPI()">Connect</button>
            <span style="cursor:pointer; font-size: 1.2rem;" onclick="toggleTheme()">🌙</span>
        </div>
    </div>
    <div class="viewer-tabs">
        <div class="tab active" onclick="switchTab('paper')">Document</div>
        <div class="tab" onclick="switchTab('graph')">Map</div>
        <div class="tab" onclick="switchTab('deck')">Evidence</div>
        <div class="tab" onclick="switchTab('action')">Action Plan</div>
    </div>
    
    <div id="view-paper" class="content-container active">
        <button onclick="readPage()">🔊 Listen</button>
        <canvas id="pdf-canvas"></canvas>
    </div>
    <div id="view-graph" class="content-container">
        <svg id="graph-svg" viewBox="0 0 800 500">
            <line x1="200" y1="250" x2="600" y2="250" stroke="#999" stroke-width="4" />
            <circle cx="200" cy="250" r="70" fill="#1a2a3a" /><text x="200" y="255" text-anchor="middle" fill="white">Defendant</text>
            <circle cx="600" cy="250" r="70" fill="#c5a059" /><text x="600" y="255" text-anchor="middle" fill="white">Plaintiff</text>
        </svg>
    </div>
    <div id="view-deck" class="content-container">
        <button id="synth-btn" onclick="generateDeck()">Synthesize Summary</button>
        <div id="summary-output" style="margin-top: 20px;">Summary...</div>
    </div>
    <div id="view-action" class="content-container">
        <button onclick="generateActionPlan()">Generate Action Plan</button>
        <div id="action-output" style="margin-top: 20px;">Plan...</div>
    </div>
</div>

<div class="chat-panel">
    <div class="chat-history" id="chat-history"><div><strong>Legal LLM:</strong> Ask questions about the document.</div></div>
    <div style="padding:15px;">
        <textarea id="chat-input" style="width:100%; height:80px;"></textarea>
        <button id="send-btn" onclick="sendMessage()" style="width:100%;">Send</button>
    </div>
</div>

<script>
    let documents = {};
    let activeDocName = null;
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    function connectAPI() {
        const btn = document.getElementById('connect-btn');
        const key = document.getElementById('api-key').value;
        if (key.length > 10) {
            btn.innerHTML = "✓ Connected";
            btn.classList.add('connected-btn');
        } else {
            alert("Please enter a valid API Key.");
        }
    }

    async function handleFileUpload(e) {
        for (const file of e.target.files) { documents[file.name] = await file.arrayBuffer(); }
        updateDocList();
    }

    function updateDocList() {
        const list = document.getElementById('doc-list');
        list.innerHTML = Object.keys(documents).map(name => `<div class="file-item ${name === activeDocName ? 'active' : ''}" onclick="selectDoc('${name}')">📄 ${name}</div>`).join('');
    }

    function selectDoc(name) {
        activeDocName = name;
        document.getElementById('active-file-label').innerHTML = `<strong>${name}</strong>`;
        renderPDF(documents[name]);
        updateDocList();
        switchTab('paper');
    }

    async function renderPDF(data) {
        const pdf = await pdfjsLib.getDocument({ data }).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.0 });
        const canvas = document.getElementById('pdf-canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: ctx, viewport }).promise;
    }

    function readPage() {
        const text = "This is a simulated reading of the legal document. Page 1: The plaintiff alleges a breach of contract regarding the delayed delivery of software assets.";
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    }

    function switchTab(t) {
        document.querySelectorAll('.content-container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(c => c.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        document.querySelector(`.tab[onclick="switchTab('${t}')"]`).classList.add('active');
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const history = document.getElementById('chat-history');
        const btn = document.getElementById('send-btn');
        const q = input.value.trim();
        if (!q || !activeDocName) return;

        btn.disabled = true;
        btn.innerText = "Analyzing...";
        history.innerHTML += `<div><strong>You:</strong> ${q}</div>`;
        input.value = '';

        setTimeout(() => {
            const isFound = Math.random() > 0.2;
            const answer = isFound ? `Analysis indicates a breach (Source: ${activeDocName}, Page 1).` : `I couldn't find this in ${activeDocName}, but according to external legal databases, this is a standard procedural step.`;
            history.innerHTML += `<div><strong>Legal LLM:</strong> ${answer}</div>`;
            history.scrollTop = history.scrollHeight;
            btn.disabled = false;
            btn.innerText = "Send";
        }, 1000);
    }

    function generateActionPlan() {
        document.getElementById('action-output').innerText = "1. File discovery requests.\n2. Depose Defendant.\n3. Review Plaintiff response.";
    }

    function generateDeck() {
        const btn = document.getElementById('synth-btn');
        btn.disabled = true;
        setTimeout(() => {
            document.getElementById('summary-output').innerText = "Synthesis complete: Contractual dispute identified in " + activeDocName;
            btn.disabled = false;
        }, 1000);
    }
</script>
</body>
</html>
